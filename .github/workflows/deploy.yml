name: deploy.yml
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: java 21환경설정
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: application-api.properties 생성
        working-directory: ./back
        run: |
          echo "${{ secrets.APPLICATION_API_PROPERTIES }}" > ./src/main/resources/application-api.properties
          ls -la ./src/main/resources/
          cat ./src/main/resources/application-api.properties

      - name: firebase,json 파일 생성
        id: firebase-json
        uses: jsdaniell/create-json@1.1.2
        with:
          name: "firebase.json"
          json: ${{ secrets.FIREBASE_JSON }}
          dir: ./back/src/main/resources/

      - name: gradle 권한 부여
        working-directory: ./back
        run: chmod +x gradlew

      - name: gradle 빌드
        working-directory: ./back
        run: ./gradlew clean build -x test

      - name: 도커 이미지 빌드
        run: |
          VERSION_TAG=$(git describe --tags --always)
          DATE_TAG=$(date +'%Y-%m-%d')
          IMAGE_TAG="${VERSION_TAG}-${DATE_TAG}"
          docker build -t pipakmj/myapp:$IMAGE_TAG -f ./back/Dockerfile .

      - name: 도커 허브에 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 도커허브에 이미지 푸시
        run: |
          VERSION_TAG=$(git describe --tags --always)
          DATE_TAG=$(date +'%Y-%m-%d')
          IMAGE_TAG="${VERSION_TAG}-${DATE_TAG}"
          docker push pipakmj/myapp:$IMAGE_TAG

      - name: SSH 접속
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "Starting deploy process"
            VERSION_TAG=$(git describe --tags --always)
            DATE_TAG=$(date +'%Y-%m-%d')
            IMAGE_TAG="${VERSION_TAG}-${DATE_TAG}"
            echo "Using IMAGE_TAG: $IMAGE_TAG"
            docker pull pipakmj/myapp:$IMAGE_TAG
            docker stop myapp_container || echo "myapp_container does not exist"
            docker rm myapp_container || echo "myapp_container does not exist"
            docker run -d --name myapp_container -p 8080:8080 pipakmj/myapp:$IMAGE_TAG